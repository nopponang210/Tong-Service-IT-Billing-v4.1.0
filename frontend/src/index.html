<!doctype html>
<html lang="th" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script>
    (() => {
      const allowed = new Set(['dark', 'light', 'amber', 'softgreen', 'ocean', 'lavender', 'rose']);
      let saved = null;
      let circuitEnabled = null;
      let circuitIntensity = null;
      try {
        saved = localStorage.getItem('tong_billing_theme');
        circuitEnabled = localStorage.getItem('tong_billing_circuit_enabled');
        circuitIntensity = localStorage.getItem('tong_billing_circuit_intensity');
      } catch {}
      document.documentElement.dataset.theme = allowed.has(saved) ? saved : 'dark';
      document.documentElement.dataset.circuit = circuitEnabled === 'false' ? 'off' : 'on';
      const intensity = Math.min(30, Math.max(0, Number(circuitIntensity ?? 18) || 18));
      document.documentElement.style.setProperty('--circuit-user-opacity', String(intensity / 100));
    })();
  </script>
  <title>เข้าสู่ระบบ | Tong Service IT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="login-page">
  <div class="login-theme-control">
    <label for="login-theme-select">ธีมสี</label>
    <select id="login-theme-select" data-theme-select aria-label="เลือกธีมสี">
      <option value="dark">กรมท่าเข้ม</option>
      <option value="light">สว่าง</option>
      <option value="amber">อำพันอบอุ่น</option>
            <option value="softgreen">เขียวอ่อน</option>
            <option value="ocean">ฟ้ามหาสมุทร</option>
            <option value="lavender">ม่วงลาเวนเดอร์</option>
            <option value="rose">ชมพูกุหลาบอ่อน</option>
    </select>
  </div>
  <main class="login-shell">
    <section class="login-card">
      <div class="login-brand">
        <img id="login-logo" src="./assets/logo-placeholder.svg" alt="Tong Service IT" class="login-logo">
        <div>
          <h1 id="login-shop-name">Tong Service IT</h1>
          <p id="login-shop-subtitle">ระบบจัดการบัญชีและเอกสาร</p>
        </div>
      </div>
      <div class="login-copy">
        <h2>เข้าสู่ระบบ</h2>
        <p>จัดการใบเสนอราคา ใบแจ้งหนี้ ใบวางบิล ใบเสร็จ และใบส่งของ / ใบส่งมอบงาน</p>
      </div>
      <div id="login-error" class="alert alert-danger hidden"></div>
      <form id="login-form" class="stack-form">
        <label>อีเมล
          <input id="email" name="email" type="email" autocomplete="username" placeholder="admin@example.com" required>
        </label>
        <label>รหัสผ่าน
          <input id="password" name="password" type="password" autocomplete="current-password" minlength="8" required>
        </label>
        <button id="login-button" class="btn btn-primary btn-block" type="submit">เข้าสู่ระบบ</button>
      </form>
      <p class="login-note">ระบบจัดการบัญชีและเอกสาร</p>
    </section>
  </main>
  <script src="./config.js"></script>
  <script type="module" src="./js/login.js"></script>
</body>
</html>
